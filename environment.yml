# MNE-RT — Conda development environment
#
# Fastest creation:
#   mamba env create -f environment.yml   (install mamba once: conda install -n base -c conda-forge mamba)
#
# Standard conda:
#   conda env create -f environment.yml
#
# Activate:
#   conda activate mne-rt
#
# Update after pulling changes:
#   mamba env update -f environment.yml --prune
#
# Tip: uv is even faster for pure-pip installs — see docs/source/install.rst.
# Just want to use MNE-RT (not develop it)? Install the published package instead:
#   mamba install -c conda-forge mne-rt

name: mne-rt

channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.11

  # Core scientific stack — conda-forge builds are pre-compiled and fast
  - numpy>=1.26,<3
  - scipy>=1.11
  - matplotlib>=3.8
  - nibabel>=5.0

  # MNE ecosystem (conda-forge)
  - mne>=1.7
  - mne-connectivity>=0.6
  - mne-features>=0.3

  # Qt / visualisation
  - pyqt>=6.6
  - pyqtgraph>=0.13
  - pyvista>=0.44
  - pyvistaqt>=0.11

  # Utilities
  - pyyaml>=6.0
  - pip

  # Packages only available (or faster) via pip
  - pip:
    - mne-lsl>=1.7
    - mne-icalabel>=0.4
    - fooof>=1.0
    - pyunlocbox>=0.5.2,<0.6
    - pactools>=0.3
    - python-osc>=1.8
    - imageio[ffmpeg]>=2.28
    - qtpy>=2.4
    # Install MNE-RT itself in editable mode
    - -e .
